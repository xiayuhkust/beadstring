<script>
// ================================================================ metadata

const BOOKS = [
  ['Gen',50],['Exod',40],['Lev',27],['Num',36],['Deut',34],['Josh',24],['Judg',21],
  ['Ruth',4],['1Sam',31],['2Sam',24],['1Kgs',22],['2Kgs',25],['1Chr',29],['2Chr',36],
  ['Ezra',10],['Neh',13],['Esth',10],['Job',42],['Ps',150],['Prov',31],['Eccl',12],
  ['Song',8],['Isa',66],['Jer',52],['Lam',5],['Ezek',48],['Dan',12],['Hos',14],
  ['Joel',3],['Amos',9],['Obad',1],['Jonah',4],['Mic',7],['Nah',3],['Hab',3],
  ['Zeph',3],['Hag',2],['Zech',14],['Mal',4],['Matt',28],['Mark',16],['Luke',24],
  ['John',21],['Acts',28],['Rom',16],['1Cor',16],['2Cor',13],['Gal',6],['Eph',6],
  ['Phil',4],['Col',4],['1Thess',5],['2Thess',3],['1Tim',6],['2Tim',4],['Titus',3],
  ['Phlm',1],['Heb',13],['Jas',5],['1Pet',5],['2Pet',3],['1John',5],['2John',1],
  ['3John',1],['Jude',1],['Rev',22],
];
const OT_COUNT = 39;

function depthOf(votes) {
  if (votes < 0)    return 'Disputed';
  if (votes >= 100) return 'Shallows';
  if (votes >= 10)  return 'Near shore';
  if (votes >= 2)   return 'Deep water';
  return 'The deep';
}
function bookIdx(abbr) { return BOOKS.findIndex(b => b[0] === abbr); }
function isOT(abbr) { const i = bookIdx(abbr); return i >= 0 && i < OT_COUNT; }
function metaOf(s) { return s.meta || null; }
function chLabel(chId) {
  const m = String(chId).match(/^([1-3]?[A-Za-z]+)(\d+)$/);
  return m ? `${m[1]} ${m[2]}` : chId;
}

// ================================================================ archive

let STR = [];
try { STR = JSON.parse(localStorage.getItem('chuanzhu_strings')) || []; } catch (e) {}
STR = STR.slice().reverse();   // chronological

const $ = (id) => document.getElementById(id);

// ================================================================ prayer rope

{
  const n = STR.length;
  const svg = $('rope');
  const W = Math.min(document.body.clientWidth - 40, 680), H = 46;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  let html = `<path d="M 0 ${H/2} Q ${W/2} ${H/2 + 8} ${W} ${H/2}"
    fill="none" stroke="rgba(253,243,227,0.35)" stroke-width="2"/>`;
  const show = Math.min(n, 60);
  for (let i = 0; i < show; i++) {
    const t = (i + 1) / (show + 1);
    const x = t * W;
    const y = H/2 + 8 * 2 * t * (1 - t) * 2;
    html += `<circle cx="${x}" cy="${y}" r="4.2" fill="none"
      stroke="rgba(245,205,138,0.85)" stroke-width="2"/>`;
  }
  svg.innerHTML = html;
  $('ropeCap').textContent = n
    ? `Prayer rope · ${n} knot${n > 1 ? 's' : ''}${n > 60 ? ' (last 60 shown)' : ''} · this rope never breaks, it only grows`
    : 'No knots on the prayer rope yet — string your first bead and tie the first one';
}

// ================================================================ chains (strands sharing a chapter connect)

function chapterKey(w) { return w[0] + w[1]; }
function computeChains() {
  const edges = [];
  for (const s of STR) {
    const m = metaOf(s);
    if (m && m.wall) edges.push({ a: chapterKey(m.wall[0]), b: chapterKey(m.wall[1]), s });
  }
  const parent = {};
  const find = (x) => { parent[x] = parent[x] ?? x; return parent[x] === x ? x : (parent[x] = find(parent[x])); };
  const union = (x, y) => { parent[find(x)] = find(y); };
  for (const e of edges) union(e.a, e.b);
  const groups = {};
  for (const e of edges) {
    const r = find(e.a);
    (groups[r] = groups[r] || []).push(e);
  }
  return Object.values(groups).filter(g => g.length >= 2).map(g => {
    const deg = {}, adj = {};
    for (const e of g) {
      deg[e.a] = (deg[e.a] || 0) + 1; deg[e.b] = (deg[e.b] || 0) + 1;
      (adj[e.a] = adj[e.a] || []).push(e.b);
      (adj[e.b] = adj[e.b] || []).push(e.a);
    }
    const nodes = Object.keys(deg);
    let start = nodes.find(k => deg[k] === 1) || nodes[0];
    const path = [start], seen = new Set([start]);
    let cur = start;
    while (true) {
      const next = (adj[cur] || []).find(k => !seen.has(k));
      if (!next) break;
      path.push(next); seen.add(next); cur = next;
    }
    const closed = nodes.every(k => deg[k] === 2) && g.length === nodes.length;
    return { path, edges: g.length, closed };
  });
}

// ================================================================ strand wall

function strandSVG() {
  return `<svg viewBox="0 0 120 52">
    <path d="M 12 10 Q 60 46 108 10" fill="none"
      stroke="rgba(245,205,138,0.7)" stroke-width="1.3"/>
    <circle cx="12" cy="10" r="6" fill="#f5cd8a"/>
    <circle cx="108" cy="10" r="6" fill="#e8a75c"/>
    <circle cx="60" cy="37" r="2.2" fill="rgba(253,243,227,0.8)"/>
  </svg>`;
}

let sortMode = 'new', filtMode = 'all', wordFilt = null;

// today = local date or UTC date (archives store ISO dates)
const TODAY_KEYS = (() => {
  const d = new Date();
  const local = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') +
    '-' + String(d.getDate()).padStart(2, '0');
  return new Set([local, d.toISOString().slice(0, 10)]);
})();
function isToday(s) { return TODAY_KEYS.has(s.date); }

function canonKey(s) {
  const m = metaOf(s);
  if (!m || !m.wall) return 99999;
  return Math.min(...m.wall.map(w => bookIdx(w[0]) * 200 + w[1]));
}

function strandList() {
  let arr = STR.map((s, i) => ({ s, i }));
  arr = arr.filter(({ s }) => !isToday(s));   // today's beads shown above, on their own
  arr = arr.filter(({ s }) => {
    const m = metaOf(s);
    if (wordFilt) {
      const words = (m && m.words) || [];
      const anch = (s.anchors || []).join(' ').toLowerCase();
      if (!words.includes(wordFilt) && !anch.includes(wordFilt)) return false;
    }
    if (filtMode === 'cross')  return m && m.wall && isOT(m.wall[0][0]) !== isOT(m.wall[1][0]);
    if (filtMode === 'deep')   return m && m.votes >= 0 && m.votes < 10;
    if (filtMode === 'debate') return m && (m.debate || m.votes < 0);
    if (filtMode === 'reason') return !!s.reason;
    return true;
  });
  if (sortMode === 'new')   arr = arr.slice().reverse();
  if (sortMode === 'canon') arr.sort((x, y) => canonKey(x.s) - canonKey(y.s));
  if (sortMode === 'depth') arr.sort((x, y) =>
    ((metaOf(x.s) || { votes: 0 }).votes) - ((metaOf(y.s) || { votes: 0 }).votes));
  return arr;
}

function versesReady() { return window.__VP && window.__VP === window.__VP_TOTAL; }

// rebuild the short passages from the refs, highlighting the anchors marked back then
function passageHTML(s, i) {
  const m = metaOf(s);
  if (!m || !m.wall || !versesReady()) return '';
  const [book, ch] = m.wall[i];
  const ref = s.refs[i] || '';
  const nums = [];
  const prim = ref.match(new RegExp(ch + ':(\\d+)(?:-(\\d+))?'));
  if (prim) {
    const v1 = +prim[1], v2 = +(prim[2] || prim[1]);
    for (let v = v1; v <= v2 && v <= v1 + 5; v++) nums.push(v);
  }
  if (!nums.length) return '';
  let text = '';
  for (const v of nums) {
    const t = window.VERSES[`${book}${ch}:${v}`];
    if (t) text += t + ' ';
  }
  if (!text) return '';
  let html = text.replace(/&/g, '&amp;').replace(/</g, '&lt;');
  // the two passages word things differently: side B prefers its own saved words
  const cands = (i === 1 && s.anchorsB && s.anchorsB.length)
    ? s.anchorsB.slice() : (s.anchors || []).slice();
  if (m && m.words) cands.push(...m.words);
  for (const a of cands.filter(Boolean)) {
    const clean = a.replace(/[,.;:!?"'“”]/g, '').trim();
    const target = html.includes(a) ? a : (clean && html.includes(clean) ? clean : null);
    if (target) html = html.split(target).join(`<b class="hl">${target}</b>`);
  }
  return `<div class="dPass"><div class="pref">${ref}</div>${html}</div>`;
}

// ---- TSK verse-level threads (v2 index: tsk/<OSIS>.js, per-book, loaded on demand) ----
const TSKQ = {};
function tskFetch(file) {
  if (!TSKQ[file]) TSKQ[file] = new Promise(res => {
    const sc = document.createElement('script');
    sc.src = '../data/tsk/' + file + '.js';
    sc.onload = () => res(); sc.onerror = () => res();
    document.head.appendChild(sc);
  });
  return TSKQ[file];
}
function tskThreads(chA, chB) {
  const bA = (chA.match(/^([1-3]?[A-Za-z]+)/) || [])[1];
  const bB = (chB.match(/^([1-3]?[A-Za-z]+)/) || [])[1];
  if (!bA || !bB) return Promise.resolve([]);
  return Promise.all([tskFetch(bA), tskFetch(bB)]).then(() => {
    const out = [], seen = new Set();
    const scan = (book, fromCh, toCh, flip) => {
      const data = (window.TSKX || {})[book];
      if (!data) return;
      for (const row of data.split(';')) {
        const p = row.split('|');
        if (p.length < 3) continue;
        const fv = p[0].split(':');
        if (book + fv[0] !== fromCh) continue;
        const mm = p[1].match(/^([1-3]?[A-Za-z]+\d+):(.+)$/);
        if (!mm || mm[1] !== toCh) continue;
        const va = flip ? mm[2] : fv[1], vb = flip ? fv[1] : mm[2];
        if (seen.has(va + '|' + vb)) continue;
        seen.add(va + '|' + vb);
        out.push([va, vb, +p[2]]);
      }
    };
    scan(bA, chA, chB, false);
    scan(bB, chB, chA, true);
    out.sort((x, y) => y[2] - x[2]);
    return out;
  });
}
// verse text of one thread (up to 4 verses, expands in place)
function passRaw(ref) {
  const m = ref.match(/^([^0-9]+|[1-3]?[A-Za-z]+)(\d+):(\d+)(?:-(\d+))?$/);
  if (!m || !window.VERSES) return [];
  const v1 = +m[3], v2 = Math.min(+(m[4] || m[3]), v1 + 3);
  const out = [];
  for (let v = v1; v <= v2; v++) {
    const t = window.VERSES[m[1] + m[2] + ':' + v];
    if (t === undefined) break;
    out.push([v, t]);
  }
  return out;
}
// shared words of the two passages (stopwords dropped, accent-safe), for highlighting
const TSTOP = new Set(('the and of unto that shall for his not with they them thee thou thy but was were are is be am will have hath had this there their then when out all which from upon into said saith him her she who whom what your our my me you it he we do did done no nor so an or if by up let may might more also because before after against among over even every been according wherefore therefore behold things thing came come cometh went let us ye yea o que los las del y en un una por con no se su para como mas pero este esta ella ellos ellas nos vos lo la el os de do da dos das um uma nao seu sua ao aos ele eles nem ja como muito').split(' '));
function commonBits(a, b) {
  const rx = /[a-záéíóúüñàâãêôõç']+/gi;
  const wa = new Set((a.match(rx) || []).map(w => w.toLowerCase()));
  const out = [];
  for (const w of (b.match(rx) || []).map(x => x.toLowerCase()))
    if (w.length > 2 && wa.has(w) && !TSTOP.has(w) && out.indexOf(w) < 0) out.push(w);
  return out.slice(0, 8);
}
function hlBits(t, words) {
  let h = t;
  for (const w of words)
    h = h.replace(new RegExp("(^|[^a-záéíóúüñàâãêôõç'])(" + w + ")(?=[^a-záéíóúüñàâãêôõç']|$)", 'gi'),
      '$1<i class="thl">$2</i>');
  return h;
}
function threadPassage(ref, words) {
  return passRaw(ref).map(([v, t], i) =>
    (i ? ' ' : '') + '<span style="opacity:0.5;font-size:0.85em">' + v + '</span> ' + hlBits(t, words || [])
  ).join('');
}
const esc = (t) => String(t).replace(/[&<>"']/g,
  (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

}

// community threads: list for everyone (tagged) + submit entry (offer the thread you strung)
function refLbl(r) {
  const q = r.match(/^([1-3]?[A-Za-z]+)(\d+):(.+)$/);
  return q ? chLabel(q[1] + q[2]) + ':' + q[3] : r;
}
function strandThread(str, A, B) {
  const vs = (str.refs || []).map((rf) => {
    const q = String(rf).match(/(\d+):(\d+(?:-\d+)?)\s*$/);
    return q ? q[2] : null;
  });
  if (!vs[0] || !vs[1]) return null;
  let va = A + ':' + vs[0], vb = B + ':' + vs[1];
  let key = [A, B].sort().join('|');
  if (key.indexOf(A) !== 0) { const t = va; va = vb; vb = t; }
  return { key: key, va: va, vb: vb };
}

// thread-list filter: appears when both kinds are present
function addFilter(box) {
  if (box.querySelector('.tflt')) return;
  box.dataset.flt = '';
  box.insertAdjacentHTML('afterbegin',
    '<div class="tflt">' +
    '<button class="fbtn on" data-f="">All</button>' +
    '<button class="fbtn" data-f="tsk">TSK</button>' +
    '<button class="fbtn" data-f="comm">Community</button></div>');
  box.querySelectorAll('.fbtn').forEach((b) => b.addEventListener('click', () => {
    box.dataset.flt = b.dataset.f;
    box.querySelectorAll('.fbtn').forEach((x) => x.classList.toggle('on', x === b));
    box.querySelectorAll('.tpass').forEach((x) => x.remove());
  }));
}
function communityInto(box, A, B, str, tskList) {
  const key = [A, B].sort().join('|');
  const fin = () => {
    const t = strandThread(str, A, B);
    // only shown when meaningful: (1) the chapter pair is new to TSK, or (2) the verse pair is
    // (a thread identical to TSK has nothing to offer; first-verse compare tolerates expansion)
    const vs = (str.refs || []).map((rf) => {
      const q = String(rf).match(/(\d+):(\d+)/); return q ? +q[2] : null;
    });
    const inTsk = (tskList || []).some((r) => parseInt(r[0]) === vs[0] && parseInt(r[1]) === vs[1]);
    if (t && !inTsk && window.cloudSignedIn && window.cloudSignedIn()) {
      const label = (tskList && tskList.length)
        ? 'Offer This New Thread to the Community'
        : 'A New Pair · Offer This Bead to the Community';
      box.insertAdjacentHTML('beforeend',
        '<div><button class="tsubmit">' + label + '</button></div>');
      const btn = box.querySelector('.tsubmit');
      btn.addEventListener('click', () => {
        btn.disabled = true;
        const words = {};
        const m2 = metaOf(str);
        if (m2 && m2.words && m2.words.length) words[document.documentElement.lang.slice(0, 2)] = m2.words;
        window.cloudSubmitThread(t.key, t.va, t.vb, words).then((res) => {
          btn.textContent = res === 'new' ? 'Offered — this thread now hangs in the community set'
            : res === 'second' ? 'Same thread exists — your second counted'
            : 'Something went wrong, try again';
          if (res === 'err') btn.disabled = false;
        });
      });
    }
  };
  if (!window.cloudThreads) { fin(); return; }
  window.cloudThreads(key).then((rows) => {
    if (curDetail !== str) return;
    if (rows && rows.length) {
      box.insertAdjacentHTML('beforeend',
        '<div class="hint chead">community additions · ' + rows.length + '</div>' +
        rows.map((r) => '<div class="tline comm"><span>' + refLbl(r.verse_a) + ' ↔ ' +
          refLbl(r.verse_b) + '</span><span class="ctag">community</span></div>').join(''));
      if ((tskList || []).length) addFilter(box);
    }
    fin();
  });
}

function renderDetailTsk(str) {
  const box = document.getElementById('dTsk');
  box.innerHTML = '';
  box.dataset.flt = '';
  const m = metaOf(str);
  const w = m && m.wall;
  if (!w || w.length < 2) return;
  const A = w[0][0] + w[0][1], B = w[1][0] + w[1][1];
  tskThreads(A, B).then(list => {
    if (curDetail !== str) return;
    box.innerHTML = (list.length
      ? `<div class="hint thint" style="margin-top:0">Threads on this bead · ${list.length} in TSK</div>` +
        list.slice(0, 12).map(r =>
          `<button class="tline tsk" data-a="${A}:${r[0]}" data-b="${B}:${r[1]}">` +
          `<span>${chLabel(A)}:${r[0]} ↔ ${chLabel(B)}:${r[1]}</span><span style="opacity:0.6">${r[2]}</span></button>`).join('') +
        (list.length > 12 ? `<div class="hint thint">… and ${list.length - 12} more</div>` : '')
      : '');
    communityInto(box, A, B, str, list);
    box.querySelectorAll('.tline').forEach(el => el.addEventListener('click', () => {
      const nx = el.nextElementSibling;
      if (nx && nx.classList.contains('tpass')) { nx.remove(); return; }
      box.querySelectorAll('.tpass').forEach(x => x.remove());
      const d = document.createElement('div');
      d.className = 'tpass';
      const lbl = (r) => r.replace(/^([1-3]?[A-Za-z]+)(\d+):/, '$1 $2:');
      if (versesReady()) {
        const ta = passRaw(el.dataset.a).map(x => x[1]).join(' ');
        const tb = passRaw(el.dataset.b).map(x => x[1]).join(' ');
        const bits = commonBits(ta, tb);
        d.innerHTML =
          '<div><b>' + lbl(el.dataset.a) + '</b>　' + threadPassage(el.dataset.a, bits) + '</div>' +
          '<div style="margin-top:0.4em"><b>' + lbl(el.dataset.b) + '</b>　' + threadPassage(el.dataset.b, bits) + '</div>';
      } else {
        d.innerHTML = 'Verses still loading… tap again shortly';
      }
      el.after(d);
    }));
  });
}

  $('seals').innerHTML = seals.map(t => `<span class="seal">${t}</span>`).join('');
}
