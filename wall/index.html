<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>墙 · 1189</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #171310; min-height: 100%; }
  body {
    font-family: Georgia, "Times New Roman", "Songti SC", "宋体", serif;
    color: #fdf3e3; -webkit-font-smoothing: antialiased;
    user-select: none; -webkit-user-select: none;
  }

  #grain { position: fixed; inset: 0; pointer-events: none; opacity: 0.06;
           mix-blend-mode: overlay; z-index: 50; }
  #vignette { position: fixed; inset: 0; pointer-events: none; z-index: 40;
    background: radial-gradient(ellipse at 50% 30%, transparent 55%, rgba(15,10,6,0.5) 100%); }

  /* ---------- 头部 ---------- */
  header { text-align: center; padding: 7vh 20px 4vh; }
  header h1 { font-size: clamp(1.8rem, 5vw, 2.6rem); font-weight: normal;
    letter-spacing: 0.55em; margin-left: 0.55em;
    text-shadow: 0 2px 30px rgba(80,45,15,0.8); }
  #stats { margin-top: 1.6em; font-size: 0.82rem; letter-spacing: 0.22em; opacity: 0.6; }
  #stats b { color: #f5cd8a; font-weight: normal; }

  /* ---------- 墙 ---------- */
  #wallWrap { position: relative; max-width: 1080px; margin: 0 auto; padding: 0 18px 4vh; }
  #lines { position: absolute; inset: 0; pointer-events: none; z-index: 5; overflow: visible; }

  .group { margin-bottom: 2.6em; }
  .groupLabel { font-size: 0.72rem; letter-spacing: 0.5em; opacity: 0.4;
    margin-bottom: 1.1em; padding-left: 2px; }
  .books { display: flex; flex-wrap: wrap; gap: 20px 26px; align-items: flex-start; }

  .book {}
  .cells { display: grid; gap: 3px; }
  .bookLabel { margin-top: 7px; font-size: 0.62rem; letter-spacing: 0.14em;
    opacity: 0.42; text-align: left; }

  /* ---------- 格子 lvl 0-5 ---------- */
  .cell {
    width: 15px; height: 15px; border-radius: 3px; cursor: pointer;
    background: rgba(253,243,227,0.055);
    border: 1px solid rgba(253,243,227,0.09);
    transition: background 0.6s, border-color 0.6s, box-shadow 0.6s;
    position: relative;
  }
  .cell.l1 { background: #4a3b24; border-color: rgba(253,220,160,0.25); }
  .cell.l2 { background: #6d5530; border-color: rgba(253,220,160,0.4); }
  .cell.l3 { background: #8a6c3b; border-color: rgba(253,225,170,0.55); }
  .cell.l3::after, .cell.l4::after, .cell.l5::after {
    content: ''; position: absolute; inset: 0; border-radius: 2px;
    background: radial-gradient(circle at 50% 50%, rgba(255,240,205,0.95) 0 15%, transparent 32%);
  }
  .cell.l4 { background: #a8804a; border-color: rgba(255,232,180,0.7);
    box-shadow: 0 0 7px rgba(245,205,138,0.35); }
  .cell.l5 { background: linear-gradient(135deg, #f5cd8a, #e8a75c);
    border-color: #ffe9c4; box-shadow: 0 0 12px rgba(245,205,138,0.65); }
  .cell.l5::after {
    background: radial-gradient(circle at 50% 50%, rgba(120,75,25,0.85) 0 15%, transparent 32%); }

  @keyframes pulse {
    0% { transform: scale(1); } 40% { transform: scale(1.65); } 100% { transform: scale(1); }
  }
  .cell.pulse { animation: pulse 0.7s ease; z-index: 10; }

  /* ---------- 图例与操作 ---------- */
  #legend { display: flex; justify-content: center; flex-wrap: wrap; gap: 1.6em;
    padding: 1em 20px 2em; font-size: 0.72rem; letter-spacing: 0.18em; opacity: 0.75; }
  #legend span { display: inline-flex; align-items: center; gap: 0.6em; }
  #legend i { width: 13px; height: 13px; border-radius: 3px; display: inline-block; }

  footer { text-align: center; padding: 0 20px 6vh; font-size: 0.72rem;
    letter-spacing: 0.2em; opacity: 0.4; line-height: 2.2; }
  footer button {
    background: none; color: #fdf3e3; border: 1px solid rgba(253,243,227,0.3);
    border-radius: 2em; padding: 0.4em 1.4em; font-family: inherit; cursor: pointer;
    font-size: 0.72rem; letter-spacing: 0.2em; margin: 0 0.5em; opacity: 0.8;
  }
  footer button:hover { background: rgba(253,243,227,0.1); }

  /* ---------- 悬浮提示 ---------- */
  #tip { position: fixed; z-index: 60; pointer-events: none; display: none;
    background: rgba(23,17,12,0.95); border: 1px solid rgba(245,205,138,0.35);
    border-radius: 6px; padding: 0.55em 1em; font-size: 0.78rem; letter-spacing: 0.12em;
    white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
  #tip b { color: #f5cd8a; font-weight: normal; }

  /* ---------- 连线（仅聚焦视图） ---------- */
  .link-line { fill: none; stroke: rgba(245,205,138,0.55); stroke-width: 1.2; }
  .link-line.draw { stroke-dasharray: 900; stroke-dashoffset: 900;
    animation: drawline 2.2s ease forwards; }
  @keyframes drawline { to { stroke-dashoffset: 0; } }

  /* ---------- 聚焦视图：全墙压暗，只亮焦点章与关联章 ---------- */
  body.focus .cell { opacity: 0.08; }
  body.focus .cell.focus-on { opacity: 1; box-shadow: 0 0 14px rgba(245,205,138,0.55); }
  body.focus .bookLabel, body.focus .groupLabel { opacity: 0.06; }
  .cell, .bookLabel, .groupLabel { transition: opacity 0.8s ease; }

  /* ---------- 章节详情面板 ---------- */
  #panel {
    position: fixed; left: 50%; bottom: 4vh; transform: translateX(-50%);
    z-index: 55; display: none; width: min(88vw, 420px);
    background: rgba(24,18,13,0.96); border: 1px solid rgba(245,205,138,0.3);
    border-radius: 12px; padding: 1.3em 1.5em 1.2em;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  }
  #panelTitle { font-size: 1rem; letter-spacing: 0.25em; }
  #panelTitle b { color: #f5cd8a; font-weight: normal; font-size: 0.82rem; margin-left: 0.8em; }
  #panelLinks { margin-top: 0.9em; font-size: 0.78rem; letter-spacing: 0.1em;
    line-height: 2.1; opacity: 0.85; }
  #panelLinks .locked { opacity: 0.35; }
  #panelLinks .locked::after { content: ' · 未解锁'; font-size: 0.85em; }
  #panelLinks .none { opacity: 0.4; }
  .panelBtns { margin-top: 1.1em; display: flex; gap: 0.7em; }
  .panelBtns button {
    background: none; color: #fdf3e3; border: 1px solid rgba(253,243,227,0.3);
    border-radius: 2em; padding: 0.45em 1.2em; font-family: inherit; cursor: pointer;
    font-size: 0.75rem; letter-spacing: 0.18em;
  }
  .panelBtns button:hover { background: rgba(253,243,227,0.1); }
  .panelBtns button.gold { border-color: rgba(245,205,138,0.55); color: #f5cd8a; }

  @media (max-width: 640px) {
    .cell { width: 12px; height: 12px; }
    .books { gap: 16px 18px; }
  }
</style>
</head>
<body>
  <canvas id="grain"></canvas>
  <div id="vignette"></div>

  <header>
    <h1>墙 · 1189</h1>
    <div id="stats"></div>
  </header>

  <div id="legend">
    <span><i style="background:rgba(253,243,227,0.055);border:1px solid rgba(253,243,227,0.12)"></i>未亮</span>
    <span><i style="background:#4a3b24"></i>初亮</span>
    <span><i style="background:#6d5530"></i>观察</span>
    <span><i style="background:#8a6c3b"></i>明白</span>
    <span><i style="background:#a8804a;box-shadow:0 0 6px rgba(245,205,138,0.4)"></i>联结</span>
    <span><i style="background:linear-gradient(135deg,#f5cd8a,#e8a75c);box-shadow:0 0 8px rgba(245,205,138,0.6)"></i>活出</span>
  </div>

  <div id="wallWrap">
    <svg id="lines"></svg>
    <div id="wall"></div>
  </div>

  <footer>
    点击格子查看详情 · 在详情中升级（演示态，进度存在本机）<br>
    达到「联结」的章，可在详情中主动查看它的联结光线<br><br>
    <button id="demoBtn">恢 复 演 示</button>
    <button id="clearBtn">清 空 全 墙</button>
  </footer>

  <div id="tip"></div>

  <div id="panel">
    <div id="panelTitle"></div>
    <div id="panelLinks"></div>
    <div class="panelBtns">
      <button id="lvlBtn">升 级</button>
      <button id="linkBtn" class="gold">查 看 联 结</button>
      <button id="closeBtn">关 闭</button>
    </div>
  </div>

<script>
// ---------------------------------------------------------------- 数据

const GROUPS = [
  ['律 法 书', [['创',50],['出',40],['利',27],['民',36],['申',34]]],
  ['历 史 书', [['书',24],['士',21],['得',4],['撒上',31],['撒下',24],['王上',22],['王下',25],
                ['代上',29],['代下',36],['拉',10],['尼',13],['斯',10]]],
  ['诗 歌 智 慧', [['伯',42],['诗',150],['箴',31],['传',12],['歌',8]]],
  ['大 先 知', [['赛',66],['耶',52],['哀',5],['结',48],['但',12]]],
  ['小 先 知', [['何',14],['珥',3],['摩',9],['俄',1],['拿',4],['弥',7],['鸿',3],
                ['哈',3],['番',3],['该',2],['亚',14],['玛',4]]],
  ['福 音 书', [['太',28],['可',16],['路',24],['约',21]]],
  ['教 会', [['徒',28]]],
  ['保 罗 书 信', [['罗',16],['林前',16],['林后',13],['加',6],['弗',6],['腓',4],['西',4],
                  ['帖前',5],['帖后',3],['提前',6],['提后',4],['多',3],['门',1]]],
  ['普 通 书 信', [['来',13],['雅',5],['彼前',5],['彼后',3],['约壹',5],['约贰',1],['约叁',1],['犹',1]]],
  ['启 示', [['启',22]]],
];

const LVL_NAMES = ['未亮','初亮','观察','明白','联结','活出'];

// 联结对（书,章,书,章,标签）——两端 lvl≥4 视为已解锁
const LINKS = [
  ['拿',2,'太',12,'约拿三日 · 人子三日'],
  ['创',22,'来',11,'献以撒 · 信心的见证'],
  ['诗',23,'约',10,'牧者之诗 · 好牧人'],
  ['诗',22,'太',27,'被离弃的呼喊 · 十字架'],
  ['赛',53,'徒',8,'受苦的仆人 · 太监所读的书'],
  ['珥',2,'徒',2,'圣灵浇灌的应许 · 五旬节'],
  ['创',3,'罗',5,'一人的堕落 · 一人的顺服'],
  ['创',3,'启',22,'失去的乐园 · 复得的乐园'],
  ['民',21,'约',3,'铜蛇被举 · 人子被举'],
];

// 用户在「串珠」里亲手串成的线，并入联结表
try {
  const extra = JSON.parse(localStorage.getItem('chuanzhuLinks')) || [];
  for (const e of extra) {
    if (!Array.isArray(e) || e.length < 5) continue;
    if (!LINKS.some(l => l[0]===e[0] && l[1]===e[1] && l[2]===e[2] && l[3]===e[3])) LINKS.push(e);
  }
} catch (err) {}

// 演示态：救恩故事线走了一小段 + 约拿书深耕
const DEMO = {
  '创1':1,'创2':1,'创3':2,'创22':4,'出3':1,'民21':4,'诗23':4,'何2':2,
  '拿1':2,'拿2':4,'拿3':2,'拿4':5,
  '太4':1,'太12':4,'约3':4,'约10':4,'约20':1,'罗8':3,'来11':4,'启21':1,'启22':1,
};

// ---------------------------------------------------------------- 状态

const KEY = 'wall1189';
let state = {};
try { state = JSON.parse(localStorage.getItem(KEY)) || {}; } catch (e) { state = {}; }
if (!Object.keys(state).length) state = { ...DEMO };

function save() { localStorage.setItem(KEY, JSON.stringify(state)); }

// ---------------------------------------------------------------- 建墙

const wall = document.getElementById('wall');
const cellMap = {};   // '拿2' -> element

for (const [gname, books] of GROUPS) {
  const g = document.createElement('div');
  g.className = 'group';
  g.innerHTML = `<div class="groupLabel">${gname}</div>`;
  const row = document.createElement('div');
  row.className = 'books';
  for (const [bname, n] of books) {
    const b = document.createElement('div');
    b.className = 'book';
    const cells = document.createElement('div');
    cells.className = 'cells';
    const cols = Math.min(n, 10);
    cells.style.gridTemplateColumns = `repeat(${cols}, 15px)`;
    for (let c = 1; c <= n; c++) {
      const id = bname + c;
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.id = id;
      cell.dataset.book = bname;
      cell.dataset.ch = c;
      cells.appendChild(cell);
      cellMap[id] = cell;
    }
    b.appendChild(cells);
    b.insertAdjacentHTML('beforeend', `<div class="bookLabel">${bname}</div>`);
    row.appendChild(b);
  }
  g.appendChild(row);
  wall.appendChild(g);
}

function applyState() {
  for (const id in cellMap) {
    const lvl = state[id] || 0;
    cellMap[id].className = 'cell' + (lvl ? ' l' + lvl : '');
  }
  updateStats();
}

// ---------------------------------------------------------------- 统计

function linksOf(id) {
  return LINKS
    .filter(([b1,c1,b2,c2]) => b1+c1 === id || b2+c2 === id)
    .map(([b1,c1,b2,c2,label]) => {
      const other = (b1+c1 === id) ? b2+c2 : b1+c1;
      const unlocked = (state[b1+c1]||0) >= 4 && (state[b2+c2]||0) >= 4;
      return { other, label, unlocked };
    });
}

function updateStats() {
  let lit = 0, gold = 0, links = 0;
  for (const id in state) if (state[id] > 0) { lit++; if (state[id] >= 5) gold++; }
  for (const [b1,c1,b2,c2] of LINKS) {
    if ((state[b1+c1]||0) >= 4 && (state[b2+c2]||0) >= 4) links++;
  }
  document.getElementById('stats').innerHTML =
    `已点亮 <b>${lit}</b> / 1189 　·　活出 <b>${gold}</b> 章 　·　已解锁联结 <b>${links}</b> 条`;
}

// ---------------------------------------------------------------- 聚焦视图（用户主动查看某章的联结）

const svg = document.getElementById('lines');
let focusedId = null;

function enterFocus(id) {
  const unlocked = linksOf(id).filter(l => l.unlocked);
  if (!unlocked.length) return;
  focusedId = id;
  document.body.classList.add('focus');
  document.querySelectorAll('.cell.focus-on').forEach(c => c.classList.remove('focus-on'));
  cellMap[id].classList.add('focus-on');
  for (const l of unlocked) cellMap[l.other].classList.add('focus-on');
  drawFocusLinks(id, true);
}

function exitFocus() {
  focusedId = null;
  document.body.classList.remove('focus');
  document.querySelectorAll('.cell.focus-on').forEach(c => c.classList.remove('focus-on'));
  svg.innerHTML = '';
}

function drawFocusLinks(id, animate) {
  const wrap = document.getElementById('wallWrap');
  const wr = wrap.getBoundingClientRect();
  svg.setAttribute('width', wr.width);
  svg.setAttribute('height', wr.height);
  svg.innerHTML = '';
  for (const l of linksOf(id)) {
    if (!l.unlocked) continue;
    const e1 = cellMap[id].getBoundingClientRect();
    const e2 = cellMap[l.other].getBoundingClientRect();
    const x1 = e1.left + e1.width/2 - wr.left, y1 = e1.top + e1.height/2 - wr.top;
    const x2 = e2.left + e2.width/2 - wr.left, y2 = e2.top + e2.height/2 - wr.top;
    const mx = (x1+x2)/2 + (y2-y1)*0.12, my = (y1+y2)/2 - Math.abs(x2-x1)*0.06 - 18;
    const p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d', `M ${x1} ${y1} Q ${mx} ${my} ${x2} ${y2}`);
    p.setAttribute('class', 'link-line' + (animate ? ' draw' : ''));
    svg.appendChild(p);
  }
}
window.addEventListener('resize', () => { if (focusedId) drawFocusLinks(focusedId, false); });

// ---------------------------------------------------------------- 详情面板

const panel = document.getElementById('panel');
let panelId = null;

function openPanel(id) {
  panelId = id;
  const cell = cellMap[id];
  const lvl = state[id] || 0;
  document.getElementById('panelTitle').innerHTML =
    `${cell.dataset.book} ${cell.dataset.ch} 章<b>${LVL_NAMES[lvl]}</b>`;
  const links = linksOf(id);
  document.getElementById('panelLinks').innerHTML = links.length
    ? links.map(l => {
        const oc = cellMap[l.other];
        return `<div class="${l.unlocked ? '' : 'locked'}">↔ ${oc.dataset.book} ${oc.dataset.ch} 章 　${l.label}</div>`;
      }).join('')
    : '<div class="none">此章暂无已收录的联结</div>';
  document.getElementById('linkBtn').style.display =
    links.some(l => l.unlocked) ? 'block' : 'none';
  panel.style.display = 'block';
}

function closePanel() {
  panel.style.display = 'none';
  panelId = null;
  exitFocus();
}

document.getElementById('lvlBtn').addEventListener('click', () => {
  if (!panelId) return;
  const next = ((state[panelId] || 0) + 1) % 6;
  state[panelId] = next;
  save();
  const cell = cellMap[panelId];
  cell.className = 'cell' + (next ? ' l' + next : '');
  cell.classList.add('pulse');
  setTimeout(() => cell.classList.remove('pulse'), 750);
  updateStats();
  openPanel(panelId);                       // 刷新面板（等级与联结解锁状态）
  if (focusedId) enterFocus(focusedId);     // 聚焦中则刷新线
});
document.getElementById('linkBtn').addEventListener('click', () => {
  if (panelId) enterFocus(panelId);
});
document.getElementById('closeBtn').addEventListener('click', closePanel);

// ---------------------------------------------------------------- 交互

const tip = document.getElementById('tip');

wall.addEventListener('pointermove', (e) => {
  const cell = e.target.closest('.cell');
  if (!cell) { tip.style.display = 'none'; return; }
  const lvl = state[cell.dataset.id] || 0;
  tip.innerHTML = `${cell.dataset.book} ${cell.dataset.ch} 章 　<b>${LVL_NAMES[lvl]}</b>`;
  tip.style.display = 'block';
  tip.style.left = Math.min(e.clientX + 14, window.innerWidth - 160) + 'px';
  tip.style.top = (e.clientY - 40) + 'px';
});
wall.addEventListener('pointerleave', () => tip.style.display = 'none');

wall.addEventListener('click', (e) => {
  const cell = e.target.closest('.cell');
  if (!cell) { if (focusedId) closePanel(); return; }
  exitFocus();
  openPanel(cell.dataset.id);
});

document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closePanel(); });

document.getElementById('demoBtn').addEventListener('click', () => {
  state = { ...DEMO }; save(); closePanel(); applyState();
});
document.getElementById('clearBtn').addEventListener('click', () => {
  state = {}; save(); closePanel(); applyState();
});

// ---------------------------------------------------------------- 颗粒

{
  const g = document.getElementById('grain');
  const gs = 140;
  g.width = gs; g.height = gs;
  g.style.width = '100vw'; g.style.height = '100vh';
  g.style.imageRendering = 'pixelated';
  const gctx = g.getContext('2d');
  function regrain() {
    const img = gctx.createImageData(gs, gs);
    for (let i = 0; i < img.data.length; i += 4) {
      const v = Math.random() * 255;
      img.data[i] = img.data[i+1] = img.data[i+2] = v;
      img.data[i+3] = 255;
    }
    gctx.putImageData(img, 0, 0);
  }
  regrain();
  setInterval(regrain, 120);
}

// ---------------------------------------------------------------- 启动

applyState();
</script>
</body>
</html>
